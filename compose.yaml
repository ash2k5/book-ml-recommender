name: book-ml

services:
  api:
    build: ./api
    command: uvicorn bookrec.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./api/bookrec:/app/bookrec
      - ./api/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      target: dev
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
