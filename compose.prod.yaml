name: book-ml-prod

services:
  api:
    build: ./api
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      target: runner
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
